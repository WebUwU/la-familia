<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Sagrada Sangre — Verwaltung</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="loading-spinner"></div><p>La Familia wird geladen...</p></div>
<div class="topbar">
  <a href="index.html" class="logo-area"><div class="logo-icon">F</div><div class="logo-text">La Familia</div></a>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="btn" id="loginBtn" onclick="toggleLogin()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span id="loginBtnText">Login</span></button>
    <button class="btn" id="chatToggle" onclick="toggleChat()" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat</button>
    <a href="auszahlung.html" class="btn" id="payoutLink" style="display:none;text-decoration:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Auszahlung</a>
  </div>
  <div class="search-container"><svg class="search-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input type="text" class="search-input" placeholder="Mitglied suchen..." id="searchInput" oninput="renderMembers()"></div>
  <div class="topbar-actions">
    <button class="btn" onclick="toggleFilterBar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>Filter</button>
    <button class="btn btn-gold" id="addUserBtn" onclick="openAddModal()" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>Hinzufügen</button>
  </div>
</div>
<div class="login-panel" id="loginPanel"><div id="loginFormArea"><h3>Anmelden</h3><div class="form-group"><label class="form-label">Benutzername</label><input type="text" class="form-input" id="loginUser" placeholder="Username"></div><div class="form-group"><label class="form-label">Passwort</label><input type="password" class="form-input" id="loginPass" placeholder="Passwort" onkeydown="if(event.key==='Enter')doLogin()"></div><button class="btn btn-gold" style="width:100%;justify-content:center" onclick="doLogin()">Einloggen</button><p id="loginError" style="color:#d45b5b;font-size:.8rem;margin-top:10px;display:none">Falscher Benutzername oder Passwort.</p></div><div id="loggedInArea" style="display:none"><div class="user-status" style="margin-bottom:14px"><div class="status-dot"></div><span style="font-weight:600" id="loggedInName"></span></div><button class="btn" style="width:100%;justify-content:center" onclick="doLogout()">Ausloggen</button></div></div>
<div class="app-layout">
  <div class="sidebar" id="chatSidebar"><div class="sidebar-header">Chat<button class="sidebar-close" onclick="toggleChat()">✕</button></div><div class="chat-messages" id="chatMessages"></div><div class="chat-input-area"><input type="text" class="chat-input" id="chatInput" placeholder="Nachricht..." onkeydown="if(event.key==='Enter')sendChat()"><button class="chat-send" onclick="sendChat()">↑</button></div></div>
  <div class="main-content"><div class="filter-bar" id="filterBar" style="display:none"></div><div id="membersArea"></div></div>
</div>
<div class="modal-overlay" id="addModal"><div class="modal"><div class="modal-header"><span class="modal-title">Mitglied hinzufügen</span><button class="modal-close" onclick="closeModal('addModal')">✕</button></div><div class="modal-body"><div class="form-group"><label class="form-label">Rang</label><select class="form-select" id="addRank"></select></div><div class="form-group"><label class="form-label">IC Name</label><input type="text" class="form-input" id="addIcName" placeholder="z.B. Carlos Mendoza"></div><div class="form-group"><label class="form-label">Discord Name</label><input type="text" class="form-input" id="addDiscord" placeholder="z.B. Carlos#1234"></div><div class="form-group"><label class="form-label">Discord ID</label><input type="text" class="form-input" id="addDiscordId" placeholder="z.B. 123456789012345678"></div></div><div class="modal-footer"><div></div><div class="modal-footer-right"><button class="btn" onclick="closeModal('addModal')">Abbrechen</button><button class="btn btn-gold" onclick="addMember()">Hinzufügen</button></div></div></div></div>
<div class="modal-overlay" id="detailModal"><div class="modal" style="max-width:600px"><div class="modal-header"><span class="modal-title" id="detailTitle">Mitglied</span><button class="modal-close" onclick="closeModal('detailModal')">✕</button></div><div class="modal-body" id="detailBody"></div><div class="modal-footer" id="detailFooter"></div></div></div>
<div class="modal-overlay" id="rankModal"><div class="modal" style="max-width:380px"><div class="modal-header"><span class="modal-title">Rang ändern</span><button class="modal-close" onclick="closeModal('rankModal')">✕</button></div><div class="modal-body"><div class="form-group"><label class="form-label">Neuer Rang</label><select class="form-select" id="rankSelect"></select></div></div><div class="modal-footer"><div></div><div class="modal-footer-right"><button class="btn" onclick="closeModal('rankModal')">Abbrechen</button><button class="btn btn-gold" onclick="saveRankChange()">Speichern</button></div></div></div></div>
<div class="modal-overlay" id="absenceModal"><div class="modal" style="max-width:400px"><div class="modal-header"><span class="modal-title">Abmeldung</span><button class="modal-close" onclick="closeModal('absenceModal')">✕</button></div><div class="modal-body"><p style="font-size:.85rem;color:var(--text-secondary);margin-bottom:16px">Springt danach automatisch auf Aktiv.</p><div class="form-row"><div class="form-group"><label class="form-label">Bis Datum (T/M)</label><input type="text" class="form-input" id="absenceDate" placeholder="25/03"></div><div class="form-group"><label class="form-label">Bis Uhrzeit</label><input type="text" class="form-input" id="absenceTime" placeholder="18:00"></div></div><div class="form-group"><label class="form-label">Grund (optional)</label><input type="text" class="form-input" id="absenceReason" placeholder="z.B. Urlaub..."></div></div><div class="modal-footer"><div></div><div class="modal-footer-right"><button class="btn" onclick="closeModal('absenceModal')">Abbrechen</button><button class="btn btn-gold" onclick="saveAbsence()">Abmelden</button></div></div></div></div>
<div class="modal-overlay" id="sanctionModal"><div class="modal" style="max-width:440px"><div class="modal-header"><span class="modal-title">Sanktion hinzufügen</span><button class="modal-close" onclick="closeModal('sanctionModal')">✕</button></div><div class="modal-body"><div class="form-group"><label class="form-label">Grund</label><input type="text" class="form-input" id="sanctionReason" placeholder="z.B. Regelverstoß..."></div><div class="form-row"><div class="form-group"><label class="form-label">Bis Datum (T/M)</label><input type="text" class="form-input" id="sanctionDate" placeholder="30/03"></div><div class="form-group"><label class="form-label">Bis Uhrzeit</label><input type="text" class="form-input" id="sanctionTime" placeholder="20:00"></div></div></div><div class="modal-footer"><div></div><div class="modal-footer-right"><button class="btn" onclick="closeModal('sanctionModal')">Abbrechen</button><button class="btn btn-gold" onclick="saveSanction()">Sanktion setzen</button></div></div></div></div>
<div class="modal-overlay" id="subroleModal"><div class="modal" style="max-width:400px"><div class="modal-header"><span class="modal-title">Subrollen</span><button class="modal-close" onclick="closeModal('subroleModal')">✕</button></div><div class="modal-body" id="subroleBody"></div><div class="modal-footer"><div></div><div class="modal-footer-right"><button class="btn btn-gold" onclick="saveSubroles()">Speichern</button></div></div></div></div>
<footer class="site-footer">made with <span class="heart">❤</span> by <span>Schinken</span> | <span>Fynn Statham</span></footer>
<script src="app.js" type="module"></script>
</body>
</html>
